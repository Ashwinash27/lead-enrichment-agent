<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lead Enrichment Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-size: 13px; color: #a0a0b8; }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #16213e;
      border: 1px solid #2a3a5c;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #4f8cff; }
    button {
      background: #4f8cff;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #3a7ae8; }
    #test-connection { background: transparent; border: 1px solid #4f8cff; margin-left: 8px; }
    #test-connection:hover { background: #4f8cff22; }
    .status { font-size: 13px; margin-left: 12px; display: none; }
    .status.success { color: #34d399; }
    .status.error { color: #f87171; }
    .status.info { color: #a0a0b8; }
    .hint { font-size: 11px; color: #6b7280; margin-top: -12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>Lead Enrichment Settings</h1>

  <label for="server-url">Server URL</label>
  <input type="url" id="server-url" placeholder="http://localhost:8000">
  <p class="hint">The URL of your enrichment API server</p>

  <label for="api-key">API Key</label>
  <input type="password" id="api-key" placeholder="Enter your API key">
  <p class="hint">X-API-Key header sent with every request</p>

  <button id="save">Save</button>
  <button id="test-connection">Test Connection</button>
  <span class="status" id="status-msg"></span>

  <script src="options.js"></script>
</body>
</html>
